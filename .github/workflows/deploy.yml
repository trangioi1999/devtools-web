# Tên của workflow CI/CD hiển thị trên giao diện GitHub Actions
name: Deploy to GitHub Pages

# Điều kiện kích hoạt: Tự động chạy khi push code lên nhánh main
on:
  push:
    branches: [main]

# Cấu hình quyền hạn của GitHub token trên máy ảo runner
permissions:
  contents: read # Quyền đọc mã nguồn để checkout code
  pages: write # Quyền tải bản build lên GitHub Pages hosting
  id-token: write # Quyền xác thực bảo mật OpenID Connect

# Quản lý hàng đợi build: Nếu có nhiều lần push liên tiếp,
# nó sẽ hủy (cancel) lượt build trước để tránh lãng phí tài nguyên
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Job 1: Build - Tải mã nguồn, cài đặt dependencies, biên dịch dự án
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo hệ điều hành Ubuntu mới nhất
    steps:
      - uses: actions/checkout@v4 # Bước 1: Tải mã nguồn của repo xuống máy ảo

      - uses: actions/setup-node@v4 # Bước 2: Cài đặt môi trường NodeJS 20
        with:
          node-version: 20
          cache: npm

      - run: npm ci # Bước 3: Cài đặt dependencies sạch từ file package-lock.json

      - run: npm run build # Bước 4: Chạy lệnh build biên dịch ra thư mục tĩnh 'dist'

      # Bước 5: Đóng gói thư mục 'dist' thành artifact lưu trữ tạm thời trên hệ thống GitHub
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Job 2: Deploy - Triển khai bản build tĩnh lên máy chủ GitHub Pages hosting
  deploy:
    needs: build # Job này CHỈ CHẠY khi Job 'build' đã hoàn thành thành công
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Bước cuối: Triển khai artifact lên hosting của GitHub Pages và lấy URL kết quả
      - id: deployment
        uses: actions/deploy-pages@v4
